services:
  - type: web
    name: savepulse-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DAILY_FREE_QUOTA
        value: "50"
      - key: WEBHOOK_SECRET
        sync: false
      - key: ADMIN_READINESS_KEY
        sync: false
      - key: UNSUBSCRIBE_SECRET
        sync: false
      - key: PUBLIC_CHECKOUT_ENABLED
        value: "false"
      - key: DAILY_EMAIL_ENABLED
        value: "false"
      - key: DAILY_EMAIL_TIME
        value: "08:30"
      - key: DAILY_EMAIL_TIMEZONE
        value: Asia/Bangkok
      - key: DAILY_EMAIL_SIGNAL_MAX_AGE_HOURS
        value: "36"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: EMAIL_PROVIDER
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAILJET_API_KEY
        sync: false
      - key: MAILJET_SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PUBLIC_URL
        value: https://savepulse-backend.onrender.com
      - key: VIP_EMAILS
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PLUS
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_BUSINESS
        sync: false
      - key: CHECKOUT_PLUS_URL
        sync: false
      - key: CHECKOUT_PRO_URL
        sync: false
      - key: CHECKOUT_BUSINESS_URL
        sync: false
