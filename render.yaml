services:
  - type: web
    name: savepulse-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DAILY_FREE_QUOTA
        value: "50"
      - key: WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: PUBLIC_URL
        value: https://savepulse-backend.onrender.com
      - key: VIP_EMAILS
        sync: false
