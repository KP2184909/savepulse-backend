<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SavePulse Email Preview</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #0f172a;
        --muted: #64748b;
        --line: #d7eaed;
        --teal: #0f766e;
        --cyan: #0891b2;
        --paper: #ffffff;
        --wash: #eef8f9;
        --amber: #fff7d6;
        --amberText: #8a5a05;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, "Helvetica Neue", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, .12), transparent 32rem),
          linear-gradient(180deg, #f8ffff 0%, var(--wash) 100%);
        color: var(--ink);
      }

      .shell {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 56px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 22px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 900;
        font-size: 20px;
        color: var(--teal);
      }

      .mark {
        width: 34px;
        height: 34px;
        border-radius: 999px;
        background: var(--teal);
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 18px;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      button,
      a.button {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        border-radius: 12px;
        padding: 10px 13px;
        font-weight: 800;
        text-decoration: none;
        cursor: pointer;
      }

      button.active,
      a.button.primary {
        background: var(--teal);
        border-color: var(--teal);
        color: #fff;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, .9fr) minmax(340px, 680px);
        gap: 28px;
        align-items: start;
      }

      .intro {
        padding-top: 36px;
      }

      .intro .eyebrow {
        color: var(--teal);
        font-size: 13px;
        font-weight: 900;
      }

      h1 {
        margin: 10px 0 12px;
        font-size: clamp(38px, 6vw, 72px);
        line-height: .95;
        letter-spacing: -.05em;
      }

      .intro p {
        color: var(--muted);
        font-size: 17px;
        line-height: 1.65;
        margin: 0 0 20px;
      }

      .planTabs {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 26px;
      }

      .planTabs a {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, .76);
        color: var(--ink);
        border-radius: 14px;
        padding: 14px;
        text-decoration: none;
        font-weight: 900;
      }

      .planTabs a span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        margin-top: 4px;
      }

      .planTabs a.active {
        border-color: var(--teal);
        box-shadow: 0 12px 28px rgba(15, 118, 110, .14);
      }

      .emailOuter {
        background: rgba(255, 255, 255, .52);
        border: 1px solid var(--line);
        border-radius: 26px;
        padding: 16px;
        box-shadow: 0 22px 60px rgba(15, 118, 110, .13);
      }

      .email {
        background: var(--paper);
        border-radius: 22px;
        overflow: hidden;
        border: 1px solid #dcebed;
      }

      .emailHead {
        background: linear-gradient(135deg, var(--teal), var(--cyan));
        color: #fff;
        padding: 28px 30px;
      }

      .emailMeta {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        font-size: 12px;
        font-weight: 800;
        opacity: .9;
      }

      .emailHead h2 {
        margin: 24px 0 0;
        font-size: clamp(28px, 4vw, 36px);
        line-height: 1.1;
        letter-spacing: -.04em;
      }

      .emailBody {
        padding: 26px 30px 30px;
      }

      .fomo {
        border: 1px solid #fde68a;
        background: var(--amber);
        color: var(--amberText);
        border-radius: 16px;
        padding: 15px 17px;
        line-height: 1.62;
        font-size: 14px;
        font-weight: 800;
      }

      .invoice {
        margin-top: 18px;
        border: 1px solid #cfe7ea;
        background: #f7feff;
        border-radius: 16px;
        padding: 18px;
      }

      .invoice strong {
        color: var(--teal);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: .06em;
      }

      .invoice h3 {
        margin: 8px 0;
        font-size: 20px;
      }

      .rows {
        margin-top: 16px;
      }

      .row {
        display: grid;
        grid-template-columns: 52px minmax(0, 1fr) auto;
        gap: 0;
        padding: 14px 0;
        border-bottom: 1px solid #e7eef0;
        align-items: start;
      }

      .icon {
        width: 40px;
        height: 40px;
        border-radius: 999px;
        background: #e8fbfa;
        display: grid;
        place-items: center;
        font-size: 17px;
        font-weight: 900;
      }

      .rowTitle {
        font-size: 15px;
        font-weight: 900;
        line-height: 1.35;
      }

      .rowBody,
      .rowSmall,
      .upgrade,
      .legal,
      .foot {
        color: var(--muted);
        line-height: 1.6;
      }

      .rowBody {
        font-size: 12px;
        margin-top: 3px;
      }

      .rowSmall {
        font-size: 11px;
        margin-top: 7px;
      }

      .badge {
        border-radius: 999px;
        font-size: 12px;
        font-weight: 900;
        padding: 8px 13px;
        white-space: nowrap;
      }

      .teal {
        background: #dff8ee;
        color: #0f766e;
      }

      .amber {
        background: #fef3c7;
        color: #b45309;
      }

      .rose {
        background: #ffe4e6;
        color: #be123c;
      }

      .locked {
        background: #e2e8f0;
        color: #334155;
      }

      .cta {
        display: inline-block;
        margin-top: 24px;
        background: var(--teal);
        color: #fff;
        text-decoration: none;
        border-radius: 14px;
        padding: 14px 20px;
        font-weight: 900;
      }

      .upgrade {
        font-size: 13px;
        margin: 18px 0 0;
      }

      .legal {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        padding: 14px 16px;
        font-size: 12px;
        margin-top: 22px;
      }

      .foot {
        font-size: 12px;
        margin-top: 16px;
      }

      .foot a {
        color: var(--teal);
        font-weight: 900;
      }

      @media (max-width: 900px) {
        .hero {
          grid-template-columns: 1fr;
        }

        .intro {
          padding-top: 8px;
        }
      }

      @media (max-width: 540px) {
        .shell {
          width: min(100% - 18px, 1120px);
          padding-top: 14px;
        }

        .topbar {
          align-items: flex-start;
        }

        .brand {
          font-size: 18px;
        }

        .planTabs {
          grid-template-columns: 1fr;
        }

        .emailOuter {
          padding: 8px;
          border-radius: 20px;
        }

        .emailHead,
        .emailBody {
          padding: 22px 18px;
        }

        .row {
          grid-template-columns: 46px minmax(0, 1fr);
        }

        .badge {
          grid-column: 2;
          justify-self: start;
          margin-top: 9px;
        }
      }
    </style>
  </head>

        const label = assets[lang][symbol];
        const state = states[lang][locked ? "locked" : statusMap[symbol]];
        const extra = locked ? "" : `<div class="rowSmall">${lang === "th" ? "ราคาอ้างอิง" : "Reference"}: ${prices[symbol]} · ${lang === "th" ? "ดูบริบท 90 วันในแดชบอร์ด" : "Open the 90-day context in dashboard"}</div>`;
        return `<div class="row">
          <div class="icon">${label[0]}</div>
          <div>
            <div class="rowTitle">${label[1]}</div>
            <div class="rowBody">${state[3]}</div>
            ${extra}
          </div>
          <span class="badge ${state[0]}">${state[1]}</span>
        </div>`;
      }

      function render() {
        document.documentElement.lang = lang;
        document.getElementById("langBtn").textContent = lang === "th" ? "EN" : "TH";
        document.getElementById("introEyebrow").textContent = copy[lang].introEyebrow;
        document.getElementById("introTitle").textContent = copy[lang].introTitle;
        document.getElementById("introCopy").textContent = copy[lang].introCopy;
        document.getElementById("updated").textContent = copy[lang].updated;
        document.getElementById("emailName").textContent = `${planNames[plan][lang][1]} · ${planNames[plan][lang][0]}`;
        document.getElementById("eyebrow").textContent = copy[lang].plans[plan].eyebrow;
        document.getElementById("headline").textContent = copy[lang].plans[plan].headline;
        document.getElementById("fomo").textContent = copy[lang].plans[plan].fomo;
        document.getElementById("invoiceSlot").innerHTML = plan === "business" ? copy[lang].invoice : "";
        document.getElementById("rows").innerHTML = [
          ...visibleSymbols(plan).map((symbol) => row(symbol)),
          ...lockedSymbols(plan).map((symbol) => row(symbol, true))
        ].join("");
        document.getElementById("upgrade").textContent = copy[lang].plans[plan].upgrade;
        document.getElementById("cta").textContent = copy[lang].cta[plan];
        document.getElementById("legal").textContent = copy[lang].legal;
        document.getElementById("foot").innerHTML = copy[lang].foot;
        document.getElementById("planTabs").innerHTML = plans.map((id) => {
          const href = `/email-preview/${id}?lang=${lang}`;
          return `<a class="${id === plan ? "active" : ""}" href="${href}">${planNames[id][lang][0]}<span>${planNames[id][lang][1]}</span></a>`;
        }).join("");
      }

      document.getElementById("langBtn").addEventListener("click", () => {
        lang = lang === "th" ? "en" : "th";
        history.replaceState(null, "", `/email-preview/${plan}?lang=${lang}`);
        render();
      });
      render();
    </script>
  </body>
</html>
