    async function applyBackendDecision(){if(st.from===st.to||vip(st.key))return;try{const r=await fetch(`/api/v1/status?symbol=${encodeURIComponent(st.key)}&from=${encodeURIComponent(st.from)}&to=${encodeURIComponent(st.to)}`);if(!r.ok)return;const j=await r.json(),u=j.userFacing,lang=st.lang==="th"?"th":"en";if(!u?.label||!u?.copy)return;const h=u.label[lang],b=u.copy[lang];if(h)$("headline").textContent=h;if(b)$("decisionCopy").textContent=b}catch(e){}}async function showDecision(){render();await applyBackendDecision();const c=$("decisionCard");$("resultNotice").classList.add("show");c.classList.add("focused");c.scrollIntoView({behavior:"smooth",block:"center"});c.focus({preventScroll:true});clearTimeout(window.__pulse);window.__pulse=setTimeout(()=>c.classList.remove("focused"),1700)}function story(){const amt=Number($("amount").value||50000),target=pairMap[st.key]?.[1]||st.to,sym=target==="THB"?"฿":target==="USD"?"$":target==="EUR"?"€":"",base=Math.max(1200,amt*.092),d=Math.max(28,Math.round(base*.031)),p=Math.round(base);$("pastValue").textContent=sym+p.toLocaleString();$("todayValue").textContent=sym+Math.max(1,p-d).toLocaleString();$("differenceValue").textContent=sym+d.toLocaleString()}
    function watch(){$("watchList").innerHTML=pairs.map(k=>{const l=vip(k),t=toneFor(k,pairMap[k][0],pairMap[k][1]),target=pairMap[k][1],pk=l?"vipOnly":t==="good"?"sGood":t==="risk"?"sRisk":"sWait",pill=l?"vip":t==="good"?"good":t==="risk"?"risk":"wait",title=st.lang==="th"?pairMap[k][2]:pairMap[k][3],sub=l?tr("vipSub"):tr("sub");return`<article class="watchItem ${l?"locked":""}" data-k="${k}"><span class="assetIcon">${icons[target]}</span><div><div class="watchTitle">${title}</div><div class="watchSub">${sub}</div></div><span class="pill ${pill}">${tr(pk)}</span></article>`}).join("");document.querySelectorAll(".watchItem").forEach(x=>x.onclick=()=>{[st.from,st.to]=pairMap[x.dataset.k];opts();showDecision();scrollTo({top:0,behavior:"smooth"})})}
    function plans(){const ids=["free","plus","pro","business"];$("plans").innerHTML=tr("plans").map((p,i)=>`<article class="plan ${i===1?"hot":""}"><h3>${p[0]}</h3><div class="price">${p[1]}</div><p>${p[2]}</p><button class="${i?"primary":"btn"}" data-plan="${ids[i]}">${i?tr("choosePaid"):tr("chooseFree")}</button></article>`).join("");document.querySelectorAll("[data-plan]").forEach(b=>b.onclick=()=>choosePlan(b.dataset.plan))}
    async function choosePlan(plan){if(plan==="free"){location.hash="alerts";$("email").focus();return}const email=$("email").value.trim();if(!email){$("subNote").textContent=tr("payNeed");location.hash="alerts";$("email").focus();return}try{const r=await fetch("/api/v1/billing/checkout",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({email,plan})}),j=await r.json();if(j.checkout?.configured&&j.checkout.url){$("subNote").textContent=tr("payOpen");location.href=j.checkout.url;return}await fetch("/api/v1/subscribe",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({email,locale:st.lang,plan:"free",watchlist:[st.key],interest:`${plan}_checkout_waitlist`})});$("subNote").textContent=tr("payMissing")}catch(e){$("subNote").textContent=tr("fail")}}
    function lang(){document.documentElement.lang=st.lang;$("langText").textContent=st.lang==="th"?"EN":"TH";document.querySelectorAll("[data-i]").forEach(n=>n.textContent=tr(n.dataset.i));document.querySelectorAll("[data-html]").forEach(n=>n.innerHTML=tr(n.dataset.html));opts();watch();plans();render()}async function load(){try{const r=await fetch("/api/v1/assets"),j=await r.json();st.assets=j.assets||[]}catch(e){st.assets=[]}lang()}$("lang").onclick=()=>{st.lang=st.lang==="th"?"en":"th";lang()};["from","to"].forEach(id=>$(id).onchange=e=>{st[id]=e.target.value;render()});$("amount").oninput=render;$("need").onchange=render;$("checkButton").onclick=showDecision;$("form").onsubmit=async e=>{e.preventDefault();try{const r=await fetch("/api/v1/subscribe",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({email:$("email").value.trim(),locale:st.lang,plan:"free",watchlist:[st.key],interest:"free_alert"})});if(!r.ok)throw Error();$("subNote").textContent=tr("ok")}catch(err){$("subNote").textContent=tr("fail")}};load();
  </script>
