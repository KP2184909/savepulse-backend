    async function applyBackendDecision(){if(st.from===st.to||vip(st.key))return;try{const r=await fetch(`/api/v1/status?symbol=${encodeURIComponent(st.key)}&from=${encodeURIComponent(st.from)}&to=${encodeURIComponent(st.to)}`);if(!r.ok)return;const j=await r.json(),u=j.userFacing,lang=st.lang==="th"?"th":"en";if(!u?.label||!u?.copy)return;const h=u.label[lang],b=u.copy[lang];if(h)$("headline").textContent=h;if(b)$("decisionCopy").textContent=b}catch(e){}}async function showDecision(){render();await applyBackendDecision();const c=$("decisionCard");$("resultNotice").classList.add("show");c.classList.add("focused");c.scrollIntoView({behavior:"smooth",block:"center"});c.focus({preventScroll:true});clearTimeout(window.__pulse);window.__pulse=setTimeout(()=>c.classList.remove("focused"),1700)}function decimals(c){return c==="BTC"?6:c==="XAU"?2:["THB","JPY"].includes(c)?0:2}function moneyText(v,c){if(!Number.isFinite(v))return"--";const d=decimals(c);return `${icons[c]||""}${v.toLocaleString(undefined,{maximumFractionDigits:d,minimumFractionDigits:d===0?0:2})} ${c}`}function rateNumber(v){return v.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:6})}function pairRate(k,from=st.from,to=st.to){const a=asset(k),price=Number(a?.price),[base,quote]=marketMap[k]||[];if(!Number.isFinite(price)||price<=0||!base||!quote)return null;if(from===base&&to===quote)return{rate:price,base,quote};if(from===quote&&to===base)return{rate:1/price,base:quote,quote:base};return null}function conversion(){const amt=Number($("amount").value||0),r=pairRate(st.key);if(!r||!Number.isFinite(amt)||amt<=0){$("rateText").textContent=tr("rateUnavailable");$("convertedText").textContent="--";$("rateNote").textContent="";return}const out=amt*r.rate;$("rateText").textContent=`${tr("rateLabel")}: 1 ${r.base} ≈ ${icons[r.quote]||""}${rateNumber(r.rate)} ${r.quote}`;$("convertedText").textContent=`${tr("convertedLabel")}: ${moneyText(amt,st.from)} ≈ ${moneyText(out,st.to)}`;$("rateNote").   <script>
    const GOLD_GRAMS_PER_TROY_OUNCE=31.1034768;
    function moneyText(v,c){
      if(!Number.isFinite(v))return"--";
      if(c==="XAU"){
        const grams=v*GOLD_GRAMS_PER_TROY_OUNCE,formatted=grams.toLocaleString(undefined,{minimumFractionDigits:1,maximumFractionDigits:2});
        return st.lang==="th"?`ทองคำ ${formatted} กรัม`:`${formatted} grams of gold`;
      }
      const d=decimals(c),formatted=v.toLocaleString(undefined,{maximumFractionDigits:d,minimumFractionDigits:d===0?0:2});
      const units=st.lang==="th"?{THB:"บาท",USD:"ดอลลาร์สหรัฐ",JPY:"เยน",EUR:"ยูโร",BTC:"BTC"}:{THB:"Thai baht",USD:"US dollars",JPY:"Japanese yen",EUR:"euros",BTC:"BTC"};
      return `${icons[c]||""}${formatted} ${units[c]||c}`;
    }
    function conversion(){
      const amt=Number($("amount").value||0),r=pairRate(st.key);
      if(!r||!Number.isFinite(amt)||amt<=0){
        $("rateText").textContent=tr("rateUnavailable");
        $("convertedText").textContent="--";
        $("rateNote").textContent="";
        return;
      }
      const sourceAmount=st.from==="XAU"?amt/GOLD_GRAMS_PER_TROY_OUNCE:amt,out=sourceAmount*r.rate,isGold=st.from==="XAU"||st.to==="XAU";
      if(isGold){
        const pricePerOunce=r.base==="XAU"?r.rate:1/r.rate,currency=r.base==="XAU"?r.quote:r.base,pricePerGram=pricePerOunce/GOLD_GRAMS_PER_TROY_OUNCE;
        $("rateText").textContent=st.lang==="th"?`ราคาทองคำอ้างอิงล่าสุด: ${moneyText(pricePerGram,currency)} ต่อกรัม`:`Latest reference gold price: ${moneyText(pricePerGram,currency)} per gram`;
        $("convertedText").textContent=st.lang==="th"?`ประมาณ: ${moneyText(sourceAmount,st.from)} ≈ ${moneyText(out,st.to)}`:`Approx.: ${moneyText(sourceAmount,st.from)} ≈ ${moneyText(out,st.to)}`;
        $("rateNote").textContent=st.lang==="th"?"อิงราคาทองคำสากล 1 ทรอยออนซ์ = 31.10 กรัม ไม่รวมค่าธรรมเนียมและส่วนต่างราคาของผู้ให้บริการ":"Based on the international gold reference: 1 troy ounce = 31.10 grams. Provider fees and spreads are not included.";
        return;
      }
      $("rateText").textContent=`${tr("rateLabel")}: 1 ${name(r.base)} ≈ ${moneyText(r.rate,r.quote)}`;
      $("convertedText").textContent=`${tr("convertedLabel")}: ${moneyText(amt,st.from)} ≈ ${moneyText(out,st.to)}`;
      $("rateNote").textContent=tr("rateNote");
    }
